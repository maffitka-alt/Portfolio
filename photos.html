<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photography</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png">
</head>

<body class="photos-page">

<div class="photo-stage">

  <img src="dance.gif" id="gifOverlay" class="gif-overlay" alt="gif">
  
  <img src="photography.png" id="photoDisplay" class="photo-img" alt="photography">

  <a href="index.html" class="photo-home" aria-label="home"></a>

  <div id="photoSet1" class="photo-set">
    <img src="1A.png" class="photo-img" alt="photo 1A">
    <img src="1B.png" class="photo-img" alt="photo 1B">
    <img src="1C.png" class="photo-img" alt="photo 1C">
  </div>

  <div class="photo-buttons">
    <button class="photo-btn btn1" onclick="showPhotoSet1()" aria-label="1"></button>
    <button class="photo-btn btn2" onclick="showSinglePhoto('2.png')" aria-label="2"></button>
    <button class="photo-btn btn3" onclick="showSinglePhoto('3.png')" aria-label="3"></button>
    <button class="photo-btn btn4" onclick="showSinglePhoto('4.png')" aria-label="4"></button>
  </div>

</div>

<script>
function hideEverything() {
  document.getElementById("photoDisplay").style.display = "none";
  document.getElementById("photoSet1").style.display = "none";
  document.getElementById("gifOverlay").style.display = "none";
}

function showPhotoSet1() {
  hideEverything();
  document.getElementById("photoSet1").style.display = "block";
  window.scrollTo(0, 0);
}

function showSinglePhoto(imageName) {
  hideEverything();
  const display = document.getElementById("photoDisplay");

  display.src = imageName;
  display.style.display = "block";

  /* 🔥 ONLY show gif on page 2 */
  if (imageName === '2.png') {
    document.getElementById("gifOverlay").style.display = "block";
  }

  window.scrollTo(0, 0);
}
</script>

</body>
</html>
