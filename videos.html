<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Videos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png">
</head>

<body class="videos-page">

<div class="poster">

  <!-- CLOSED POSTER -->
  <img src="poster-closed.png" id="menuImage" class="poster-img" alt="videos menu">

  <!-- CLICKABLE AREAS -->
  <a href="index.html" class="home-click" aria-label="home"></a>

  <button class="video-key key1" onclick="showMenu()" aria-label="all videos"></button>

<button class="video-key key2" onclick="playVideo('https://player.vimeo.com/video/1189115918')" aria-label="toothgems"></button>

<button class="video-key key3" onclick="playVideo('https://player.vimeo.com/video/1189148215')" aria-label="colour grading and moving castle"></button>

<button class="video-key key4" onclick="playVideo('https://player.vimeo.com/video/1189116122')" aria-label="hardpill lineup"></button>

<button class="video-key key5" onclick="playVideo('https://player.vimeo.com/video/1189115962')" aria-label="PYK Cowboys"></button>

<button class="video-key key6" onclick="playVideo('https://player.vimeo.com/video/1189116097')" aria-label="NAFF video 3"></button>

<button class="video-key key7" onclick="playVideo('https://player.vimeo.com/video/1189147187')" aria-label="500,000"></button>

  <!-- OPEN POSTER + VIDEO -->
  <div class="player" id="player">
    <img src="poster-open.png" class="poster-img" alt="video playing">

    <iframe
      id="videoPlayer"
      src=""
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
function playVideo(link) {
  document.getElementById("player").style.display = "block";

  const player = document.getElementById("videoPlayer");
  player.src = "";
  player.src = link + "?autoplay=1&muted=1";
}
</script>

</body>
</html>
