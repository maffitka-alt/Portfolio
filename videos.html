<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Videos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="videos-page">

<a href="index.html" class="home-button">
  <img src="homebutton.png" alt="home">
</a>

<div class="video-page">

  <img src="video.png" class="video-menu" id="menuImage" alt="videos menu">

  <button class="video-key key1" onclick="playVideo('https://player.vimeo.com/video/1189116097')"></button>
  <button class="video-key key2" onclick="playVideo('https://player.vimeo.com/video/1189116122')"></button>
  <button class="video-key key3" onclick="playVideo('https://player.vimeo.com/video/1189147187')"></button>
  <button class="video-key key4" onclick="playVideo('https://player.vimeo.com/video/1189115962')"></button>
  <button class="video-key key5" onclick="playVideo('https://player.vimeo.com/video/1189115918')"></button>
  <button class="video-key key6" onclick="playVideo('https://player.vimeo.com/video/1189148215')"></button>

  <div class="player" id="player">
    <img src="playing.png" class="playing-img" alt="playing">

    <iframe
      id="videoPlayer"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
function playVideo(link) {
  document.getElementById("menuImage").style.display = "none";
  document.getElementById("player").style.display = "block";

  const player = document.getElementById("videoPlayer");
  player.src = "";
  player.src = link + "?autoplay=1&muted=1";
}
</script>

</body>
</html>
